name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - 'src/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/WHATS-NEW.md'
      - 'docs/MIGRATION.md'
      - 'docs/FAQ.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Root deps so TypeDoc can resolve the library's imported types.
      - run: npm ci
      - name: Install docs deps
        working-directory: website
        run: npm ci
      - name: Build docs site
        working-directory: website
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
